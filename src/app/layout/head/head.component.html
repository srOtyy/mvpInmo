<div class="head">
  <div class="head__notificaciones">
    @for (notificacion of listaNotificaciones$ | async; track notificacion.id) {
      <div class="notificacion-badge" 
           [class.pendiente]="notificacion.estado === 'pendiente'" 
           [class.vencida]="notificacion.estado === 'completada'"
           title="{{notificacion.mensaje}} - {{notificacion.fecha | date:'short'}}">
        <span class="notificacion-icon">
          {{ notificacion.tipo === 'vencimiento' ? '⏳' : '📅' }}
        </span>
      </div>
    }
  </div>
  <div class="head__fecha">
    <span class="head__fecha--diaDeLaSemana">{{fechaYHora | date:'EEEE' | titlecase}}</span>
    <span class="head__fecha--mesAnio"> {{fechaYHora | date:'d \'de\' MMMM' }} </span>

  </div>
</div>
