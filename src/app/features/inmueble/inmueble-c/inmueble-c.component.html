<app-card-list entidad="Inmuebles">
    @for(inmueble of $listaInmuebles; track inmueble.id) {
        <app-item-entidad [entidad]="inmueble"
        [titulo]="inmueble.id"
        (ver)="verInmueble($event)"
        (editar)="editarInmueble($event)"
        (eliminar)="eliminarInmueble($event)">
    </app-item-entidad>
    }

</app-card-list>
