<form class="formulario" [formGroup]="formularioEditarPropietario">

    <mat-form-field>
        <mat-label>ID</mat-label>
        <input matInput formControlName="id" readonly>
    </mat-form-field>

  @for(c of entidad.caracteristicas; track $index){
     <mat-form-field>
      <input
        matInput
        [formControlName]="c.clave"
        [placeholder]="c.clave">
    </mat-form-field>
  }
    <button type="submit" mat-flat-button  (click)="guardarCambios()">Guardar cambios</button>

</form>
