<app-card-list entidad="Inquilinos">
     <div class="acciones">
        <p>Filtrar: </p>
        <button mat-icon-button color="primary" (click)="ordenarAlfabeticamente()">
            <mat-icon>sort_by_alpha</mat-icon>
        </button>
    </div>
    <mat-divider></mat-divider>

    @for(inquilino of $listaInquilinos; track $index) {
        <br>
        <div class="item">
            <mat-accordion>
                <mat-expansion-panel (opened)="panelOpenState.set(true)" (closed)="panelOpenState.set(false)">
                    <mat-expansion-panel-header>
                    <mat-panel-title> {{obtenerNombre(inquilino)}} </mat-panel-title>
                    <!-- <mat-panel-description>
                    </mat-panel-description> -->
                    </mat-expansion-panel-header>
                <app-accordion-inquilino 
                [entidad]="inquilino"
                (eliminar)="eliminarInquilino($event)"
                (editar)="editarInquilino($event)"
                ></app-accordion-inquilino>
                </mat-expansion-panel>
            </mat-accordion>
        </div>
    }
</app-card-list>
